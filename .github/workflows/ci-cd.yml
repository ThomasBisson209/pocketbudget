name: CI/CD — PocketBudget

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:

  # ─────────────────────────────────────────────────────────────────
  # 1. Backend unit tests
  # ─────────────────────────────────────────────────────────────────
  test-backend:
    name: 🧪 Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run unit tests
        run: mvn test -P unit -q
        working-directory: backend

  # ─────────────────────────────────────────────────────────────────
  # 2. Frontend build (TypeScript check + Vite build)
  # ─────────────────────────────────────────────────────────────────
  build-frontend:
    name: 🏗️ Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build (tsc + vite)
        run: npm run build
        working-directory: frontend

  # ─────────────────────────────────────────────────────────────────
  # 3. Deploy to Railway  — only on push to master, after tests pass
  # ─────────────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Railway
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    needs: [test-backend, build-frontend]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli@latest

      - name: Deploy
        run: railway up --service ${{ secrets.RAILWAY_SERVICE_ID }} --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
